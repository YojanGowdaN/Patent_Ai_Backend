<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patent Detail — PatentAI</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">P</div>
        <div><div class="logo-text">PatentAI</div><div class="logo-sub">Office System</div></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item" data-href="dashboard.html"><span class="nav-icon">📊</span>Dashboard</div>
      <div class="nav-section-label">Patents</div>
      <div class="nav-item active" data-href="patents.html"><span class="nav-icon">📄</span>All Patents</div>
      <div class="nav-item" data-href="submit.html"><span class="nav-icon">➕</span>Submit Patent</div>
      <div class="nav-section-label">Trademarks</div>
      <div class="nav-item" data-href="trademarks.html"><span class="nav-icon">™</span>Trademarks</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" id="logout-btn" title="Click to logout">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info"><div class="name" id="user-name">Loading...</div><div class="role" id="user-role">—</div></div>
        <span style="margin-left:auto;font-size:12px;color:var(--text-muted);">⏏</span>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <a href="patents.html" class="btn btn-ghost btn-sm">← Back</a>
      <h1 id="page-title">Patent Detail</h1>
      <span id="header-status" style="margin-left:auto;"></span>
    </div>
    <div class="page-body" id="content">
      <div class="loading"><div class="spinner"></div> Loading patent...</div>
    </div>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  initSidebar();
  const params = new URLSearchParams(location.search);
  const patentId = params.get('id');
  if (!patentId) window.location.href = 'patents.html';

  let patent = null;

  async function runAction(label, fn) {
    const btn = document.getElementById('btn-' + label);
    if (btn) { btn.disabled = true; btn.innerHTML = `<div class="spinner" style="width:14px;height:14px;"></div> Running...`; }
    try {
      await fn();
      toast.success(`${label} completed`);
      await loadPatent();
    } catch (err) {
      toast.error(err.message);
      if (btn) { btn.disabled = false; btn.innerHTML = label; }
    }
  }

  async function loadPatent() {
    try {
      patent = await api.patents.get(patentId);
      render(patent);
    } catch (err) {
      document.getElementById('content').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  }

  function render(p) {
    document.getElementById('page-title').textContent = p.patent_id;
    document.getElementById('header-status').innerHTML = statusBadge(p.status);

    const report = p.ai_report ? (typeof p.ai_report === 'string' ? JSON.parse(p.ai_report) : p.ai_report) : null;

    const canAnalyze = ['Submitted', 'Requires Modification'].includes(p.status);
    const canFormality = false; // Auto-run by AI after analysis
    const canExaminerReview = p.status === 'Examiner Review';
    const canStatus = false; // Remove manual approve/reject buttons
    const canSimilarity = p.novelty_score != null;
    const canWithdraw = true; // Allow withdraw for all non-rejected patents

    document.getElementById('content').innerHTML = `
      <div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        ${canAnalyze ? `<button class="btn btn-secondary" id="btn-AI Analysis" onclick="runAction('AI Analysis', () => api.patents.analyze(${p.id}))"><span class="ai-pulse" style="margin-right:4px;"></span> Run AI Analysis</button>` : ''}
        ${canExaminerReview ? `<button class="btn btn-primary" id="btn-Examiner Check" onclick="runAction('Examiner Check', () => api.patents.examinerCheck(${p.id}))"><span class="ai-pulse" style="margin-right:4px;"></span> Run Examiner Check (AI)</button>` : ''}
        ${canSimilarity ? `<button class="btn btn-ghost" id="btn-Similarity" onclick="runSimilarity()">🔍 Similarity Check</button>` : ''}
        ${canWithdraw && p.status === 'Approved' ? `<button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="withdrawPatent()">⏎ Withdraw Approval</button>` : ''}
        ${canWithdraw && p.status !== 'Approved' && p.status !== 'Rejected' ? `<button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="withdrawPatent()">🗑 Withdraw</button>` : ''}
      </div>

      <div class="detail-grid">
        <!-- Left Column -->
        <div style="display:flex;flex-direction:column;gap:20px;">

          <!-- Basic Info -->
          <div class="card">
            <div class="card-header"><span class="card-title">Patent Information</span></div>
            <div class="info-row"><span class="label">Patent ID</span><span style="font-family:'JetBrains Mono',monospace;color:var(--cyan);">${p.patent_id}</span></div>
            <div class="info-row"><span class="label">Title</span><span style="font-weight:600;">${p.title}</span></div>
            <div class="info-row"><span class="label">Applicant</span><span>${p.applicant_name}</span></div>
            <div class="info-row"><span class="label">Inventor</span><span>${p.inventor_name || '—'}</span></div>
            <div class="info-row"><span class="label">Domain</span><span>${p.technical_domain}</span></div>
            <div class="info-row"><span class="label">Filed</span><span>${formatDate(p.filing_date)}</span></div>
            <div class="info-row"><span class="label">Status</span>${statusBadge(p.status)}</div>
            ${p.similarity_risk ? '<div class="alert alert-warning" style="margin-top:10px;">⚠ High similarity risk detected — prior art conflict possible</div>' : ''}
          </div>

          <!-- Description -->
          <div class="card">
            <div class="card-header"><span class="card-title">Description</span></div>
            <p style="font-size:13.5px;color:var(--text-secondary);line-height:1.7;">${p.description}</p>
          </div>

          <!-- Claims -->
          ${p.claims ? `<div class="card">
            <div class="card-header"><span class="card-title">Claims</span></div>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.7;font-family:'JetBrains Mono',monospace;">${p.claims}</p>
          </div>` : ''}

          <!-- AI Report -->
          ${report ? `<div class="card">
            <div class="card-header"><span class="card-title">AI Analysis Report</span><span class="ai-pulse"></span></div>
            ${report.abstract ? `<div style="background:var(--bg-secondary);border-radius:6px;padding:12px;margin-bottom:14px;font-size:13px;color:var(--text-secondary);line-height:1.7;border-left:3px solid var(--blue-primary);">${report.abstract}</div>` : ''}
            ${report.keywords ? `<div class="tags">${report.keywords.map(k => `<span class="tag">${k}</span>`).join('')}</div>` : ''}
            <div style="margin-top:16px;">
              ${report.weaknesses && report.weaknesses.length ? `
                <div class="analysis-section">
                  <h4>⚠ Identified Weaknesses</h4>
                  <ul class="analysis-list">${report.weaknesses.map(w => `<li>${w}</li>`).join('')}</ul>
                </div>` : ''}
              ${report.improvements && report.improvements.length ? `
                <div class="analysis-section" style="margin-top:12px;">
                  <h4>💡 Improvement Recommendations</h4>
                  <ul class="analysis-list">${report.improvements.map(i => `<li>${i}</li>`).join('')}</ul>
                </div>` : ''}
              ${report.recommendation ? `
                <div class="alert alert-info" style="margin-top:12px;">
                  <strong>Recommendation:</strong> ${report.recommendation}
                </div>` : ''}
            </div>
          </div>` : ''}

          <!-- Similarity Results -->
          <div id="similarity-results"></div>
        </div>

        <!-- Right Column -->
        <div style="display:flex;flex-direction:column;gap:20px;">

          <!-- Scores -->
          <div class="card">
            <div class="card-header"><span class="card-title">AI Scores</span></div>
            ${p.novelty_score != null ? scoreBar('Novelty', p.novelty_score) : '<p style="font-size:12px;color:var(--text-muted);">Run AI analysis to get scores</p>'}
            ${p.patent_strength_score != null ? scoreBar('Patent Strength', p.patent_strength_score) : ''}
            ${p.formality_score != null ? scoreBar('Formality', p.formality_score) : ''}
          </div>

          <!-- Status Timeline -->
          <div class="card">
            <div class="card-header"><span class="card-title">Examination Pipeline</span></div>
            <div class="timeline">
              ${[
                ['Submitted', 'Submitted'],
                ['Under AI Review', 'AI Analysis'],
                ['Formality Check Pending', 'Formality Check'],
                ['Examiner Review', 'Examiner Review'],
                ['Approved', 'Final Decision'],
              ].map(([s, label]) => {
                const statuses = ['Submitted','Under AI Review','Formality Check Pending','Examiner Review','Approved','Rejected'];
                const currentIdx = statuses.indexOf(p.status);
                const thisIdx = statuses.indexOf(s);
                const isDone = currentIdx > thisIdx || p.status === 'Approved';
                const isActive = p.status === s;
                const isRejected = p.status === 'Rejected' && s === 'Approved';
                return `<div class="timeline-item">
                  <div class="timeline-dot ${isDone ? 'done' : ''} ${isActive ? 'active' : ''} ${isRejected ? 'rejected' : ''}"></div>
                  <div class="timeline-title" style="color:${isActive ? 'var(--blue-light)' : isDone ? 'var(--green)' : 'var(--text-muted)'};">${label}</div>
                </div>`;
              }).join('')}
              ${p.status === 'Rejected' ? `<div class="timeline-item">
                <div class="timeline-dot rejected"></div>
                <div class="timeline-title" style="color:var(--red);">Rejected</div>
              </div>` : ''}
            </div>
          </div>

          <!-- Metadata -->
          <div class="card">
            <div class="card-header"><span class="card-title">Record Metadata</span></div>
            <div class="info-row"><span class="label">Created</span><span style="font-size:12px;">${formatDate(p.created_at)}</span></div>
            <div class="info-row"><span class="label">Updated</span><span style="font-size:12px;">${formatDate(p.updated_at)}</span></div>
            <div class="info-row"><span class="label">DB ID</span><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);">#${p.id}</span></div>
          </div>
        </div>
      </div>`;
  }

  async function runSimilarity() {
    const el = document.getElementById('similarity-results');
    el.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div> Checking similarity...</div></div>';
    try {
      const results = await api.patents.similarity(patentId);
      if (!results.length) {
        el.innerHTML = '<div class="alert alert-success">✓ No significant similar patents found. Low duplication risk.</div>';
        return;
      }
      el.innerHTML = `<div class="card">
        <div class="card-header"><span class="card-title">Similarity Results</span></div>
        ${results.map(r => `
          <div style="border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);">${r.patent_id}</span>
              <span class="badge ${r.similarity_score>=70?'badge-rejected':'badge-formality'}">${r.similarity_score}% similar</span>
            </div>
            <div style="font-size:13px;font-weight:500;">${r.title}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${r.match_reason}</div>
          </div>`).join('')}
      </div>`;
      if (results.some(r => r.similarity_score >= 70)) {
        toast.error('High similarity detected — review required');
      }
    } catch (err) {
      el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  }

  async function updateStatus(newStatus) {
    if (!confirm(`Set patent status to "${newStatus}"?`)) return;
    try {
      await api.patents.update(patentId, { status: newStatus });
      toast.success(`Patent ${newStatus.toLowerCase()}`);
      await loadPatent();
    } catch (err) {
      toast.error(err.message);
    }
  }

  async function withdrawPatent() {
    const title = patent ? patent.title : 'this patent';
    if (!confirm(`Withdraw and permanently delete "${title}"?\n\nThis cannot be undone.`)) return;
    try {
      await api.patents.withdraw(patentId);
      toast.success('Patent withdrawn and deleted');
      setTimeout(() => { window.location.href = 'patents.html'; }, 800);
    } catch (err) {
      toast.error(err.message);
    }
  }

  loadPatent();
</script>
</body>
</html>
