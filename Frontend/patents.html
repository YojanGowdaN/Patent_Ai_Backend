<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patents — PatentAI</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">P</div>
        <div><div class="logo-text">PatentAI</div><div class="logo-sub">Office System</div></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item" data-href="dashboard.html"><span class="nav-icon">📊</span>Dashboard</div>
      <div class="nav-section-label">Patents</div>
      <div class="nav-item active" data-href="patents.html"><span class="nav-icon">📄</span>All Patents</div>
      <div class="nav-item" data-href="submit.html"><span class="nav-icon">➕</span>Submit Patent</div>
      <div class="nav-section-label">Trademarks</div>
      <div class="nav-item" data-href="trademarks.html"><span class="nav-icon">™</span>Trademarks</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" id="logout-btn" title="Click to logout">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info"><div class="name" id="user-name">Loading...</div><div class="role" id="user-role">—</div></div>
        <span style="margin-left:auto;font-size:12px;color:var(--text-muted);">⏏</span>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Patent Database</h1>
      <span id="count-label" style="font-size:12px;color:var(--text-muted);"></span>
      <a href="submit.html" class="btn btn-primary btn-sm" style="margin-left:auto;">+ Submit Patent</a>
    </div>

    <div class="page-body">
      <!-- Filters -->
      <div class="card" style="margin-bottom:20px;">
        <div class="search-bar" style="margin-bottom:0;">
          <input type="search" class="form-control" id="search" placeholder="Search by title, ID, description..." style="flex:1;max-width:340px;" oninput="debounceLoad()"/>
          <select class="form-control" id="filter-status" onchange="loadPatents()" style="max-width:180px;">
            <option value="">All Statuses</option>
            <option>Submitted</option>
            <option>Under AI Review</option>
            <option>Formality Check Pending</option>
            <option>Requires Modification</option>
            <option>Examiner Review</option>
            <option>Approved</option>
            <option>Rejected</option>
          </select>
          <select class="form-control" id="filter-domain" onchange="loadPatents()" style="max-width:200px;">
            <option value="">All Domains</option>
            <option>Agriculture Technology</option>
            <option>Smart City Technology</option>
            <option>Healthcare Technology</option>
            <option>Renewable Energy</option>
            <option>Medical Devices</option>
            <option>Cybersecurity</option>
            <option>Environmental Technology</option>
            <option>Artificial Intelligence</option>
            <option>Robotics</option>
            <option>Biotechnology</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Clear</button>
        </div>
      </div>

      <!-- Patent List -->
      <div id="patents-container">
        <div class="loading"><div class="spinner"></div> Loading patents...</div>
      </div>
    </div>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  initSidebar();
  let debounceTimer;

  function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadPatents, 350);
  }

  function clearFilters() {
    document.getElementById('search').value = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-domain').value = '';
    loadPatents();
  }

  async function loadPatents() {
    const params = {};
    const search = document.getElementById('search').value.trim();
    const status = document.getElementById('filter-status').value;
    const domain = document.getElementById('filter-domain').value;
    if (search) params.search = search;
    if (status) params.status = status;
    if (domain) params.domain = domain;

    const container = document.getElementById('patents-container');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      const patents = await api.patents.list(params);
      document.getElementById('count-label').textContent = `${patents.length} patent${patents.length !== 1 ? 's' : ''}`;

      if (!patents.length) {
        container.innerHTML = `<div class="empty">
          <div class="empty-icon">📄</div>
          <div class="empty-text">No patents found</div>
          <div class="empty-sub">Try adjusting your filters or <a href="submit.html">submit a new patent</a>.</div>
        </div>`;
        return;
      }

      container.innerHTML = `<div class="grid-auto">${patents.map(p => `
        <div class="patent-card" onclick="window.location='patent-detail.html?id=${p.id}'">
          <div class="patent-card-header">
            <div>
              <div class="patent-id">${p.patent_id}</div>
              <div class="patent-title">${p.title}</div>
            </div>
            <div>${statusBadge(p.status)}</div>
          </div>
          <div class="patent-meta">
            <span>👤 ${p.applicant_name}</span>
            <span>🏷️ ${p.technical_domain}</span>
            <span>📅 ${formatDate(p.filing_date)}</span>
            ${p.similarity_risk ? '<span class="risk-badge risk-high">⚠ Similarity Risk</span>' : ''}
          </div>
          ${(p.novelty_score != null || p.patent_strength_score != null) ? `
          <div class="patent-scores">
            ${p.novelty_score != null ? `<div class="score-item">Novelty: <strong style="color:${p.novelty_score>=75?'var(--green)':p.novelty_score>=50?'var(--amber)':'var(--red)'};">${p.novelty_score.toFixed(0)}</strong></div>` : ''}
            ${p.patent_strength_score != null ? `<div class="score-item">Strength: <strong style="color:${p.patent_strength_score>=75?'var(--green)':p.patent_strength_score>=50?'var(--amber)':'var(--red)'};">${p.patent_strength_score.toFixed(0)}</strong></div>` : ''}
            ${p.formality_score != null ? `<div class="score-item">Formality: <strong>${p.formality_score.toFixed(0)}</strong></div>` : ''}
          </div>` : ''}
        </div>`).join('')}</div>`;
    } catch (err) {
      container.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  }

  loadPatents();
</script>
</body>
</html>
