<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trademarks — PatentAI</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">P</div>
        <div><div class="logo-text">PatentAI</div><div class="logo-sub">Office System</div></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item" data-href="dashboard.html"><span class="nav-icon">📊</span>Dashboard</div>
      <div class="nav-section-label">Patents</div>
      <div class="nav-item" data-href="patents.html"><span class="nav-icon">📄</span>All Patents</div>
      <div class="nav-item" data-href="submit.html"><span class="nav-icon">➕</span>Submit Patent</div>
      <div class="nav-section-label">Trademarks</div>
      <div class="nav-item active" data-href="trademarks.html"><span class="nav-icon">™</span>Trademarks</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" id="logout-btn" title="Click to logout">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info"><div class="name" id="user-name">Loading...</div><div class="role" id="user-role">—</div></div>
        <span style="margin-left:auto;font-size:12px;color:var(--text-muted);">⏏</span>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Trademark Registry</h1>
      <button class="btn btn-secondary btn-sm" style="margin-left:auto;" onclick="toggleModal('register-modal', true)">+ Register Trademark</button>
    </div>

    <div class="page-body">
      <div class="grid-2" style="margin-bottom:24px;">
        <!-- AI Checker -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">AI Conflict Checker</span>
            <span class="ai-pulse"></span>
          </div>
          <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">Enter a proposed trademark to check for conflicts against registered marks.</p>
          <div class="form-group">
            <label class="form-label">Proposed Trademark Name</label>
            <input type="text" class="form-control" id="check-name" placeholder="e.g. NovaTech"/>
          </div>
          <div class="form-group">
            <label class="form-label">Brand Text / Tagline</label>
            <input type="text" class="form-control" id="check-text" placeholder="e.g. Powering Tomorrow's Innovation"/>
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="checkTrademark()" id="check-btn">
            Run AI Similarity Check
          </button>
          <div id="check-result" style="margin-top:16px;"></div>
        </div>

        <!-- Register Form (hidden until button) -->
        <div class="card" id="register-modal" style="display:none;">
          <div class="card-header">
            <span class="card-title">Register New Trademark</span>
            <button class="btn btn-ghost btn-sm" onclick="toggleModal('register-modal', false)">✕</button>
          </div>
          <div id="reg-msg"></div>
          <form id="reg-form">
            <div class="form-group">
              <label class="form-label">Trademark Name *</label>
              <input type="text" class="form-control" id="reg-name" placeholder="e.g. NovaTech" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Owner / Organization *</label>
              <input type="text" class="form-control" id="reg-owner" placeholder="e.g. Acme Corp." required/>
            </div>
            <div class="form-group">
              <label class="form-label">Category *</label>
              <select class="form-control" id="reg-category" required>
                <option value="">Select category...</option>
                <option>Technology</option>
                <option>Healthcare</option>
                <option>Finance</option>
                <option>Retail</option>
                <option>Food & Beverage</option>
                <option>Entertainment</option>
                <option>Manufacturing</option>
                <option>Services</option>
                <option>Education</option>
                <option>Energy</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Register Trademark</button>
          </form>
        </div>

        <!-- Stats when no modal -->
        <div class="card" id="tm-stats-card">
          <div class="card-header"><span class="card-title">Registry Stats</span></div>
          <div id="tm-stats"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>

      <!-- Trademark Table -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Registered Trademarks</span>
          <div style="display:flex;gap:8px;">
            <input type="search" class="form-control" id="tm-search" placeholder="Search trademarks..." style="max-width:220px;" oninput="debounceLoad()"/>
          </div>
        </div>
        <div id="tm-table">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  initSidebar();
  let debounceTimer;

  function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadTrademarks, 350);
  }

  function toggleModal(id, show) {
    document.getElementById(id).style.display = show ? 'block' : 'none';
    document.getElementById('tm-stats-card').style.display = show ? 'none' : 'block';
  }

  async function loadStats() {
    try {
      const tms = await api.trademarks.list();
      const active = tms.filter(t => t.status === 'Active').length;
      document.getElementById('tm-stats').innerHTML = `
        <div class="stats-grid" style="grid-template-columns:1fr 1fr;">
          <div class="stat-card" style="--accent-color:var(--blue-primary)"><div class="stat-label">Total</div><div class="stat-value">${tms.length}</div></div>
          <div class="stat-card" style="--accent-color:var(--green)"><div class="stat-label">Active</div><div class="stat-value">${active}</div></div>
        </div>`;
    } catch {}
  }

  async function loadTrademarks() {
    const search = document.getElementById('tm-search').value.trim();
    const params = {};
    if (search) params.search = search;

    document.getElementById('tm-table').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const tms = await api.trademarks.list(params);
      if (!tms.length) {
        document.getElementById('tm-table').innerHTML = `<div class="empty">
          <div class="empty-icon">™</div>
          <div class="empty-text">No trademarks found</div>
          <div class="empty-sub">Register the first trademark using the button above.</div>
        </div>`;
        return;
      }
      document.getElementById('tm-table').innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>#</th><th>Trademark</th><th>Owner</th><th>Category</th><th>Status</th><th>Registered</th></tr></thead>
        <tbody>${tms.map((t, i) => `
          <tr>
            <td style="font-size:12px;color:var(--text-muted);">${i + 1}</td>
            <td><strong>${t.trademark_name}</strong></td>
            <td style="color:var(--text-secondary);">${t.owner}</td>
            <td><span class="tag">${t.category}</span></td>
            <td>${statusBadge(t.status || 'Active')}</td>
            <td style="font-size:12px;color:var(--text-muted);">${formatDate(t.created_at)}</td>
          </tr>`).join('')}
        </tbody></table></div>`;
    } catch (err) {
      document.getElementById('tm-table').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  }

  async function checkTrademark() {
    const name = document.getElementById('check-name').value.trim();
    const text = document.getElementById('check-text').value.trim();
    if (!name || !text) { toast.error('Please enter both trademark name and brand text'); return; }

    const btn = document.getElementById('check-btn');
    btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;display:inline-block;margin-right:6px;"></div> Analyzing...';
    document.getElementById('check-result').innerHTML = '';

    try {
      const result = await api.trademarks.check({ trademark_name: name, brand_text: text });
      const riskClass = result.conflict_risk === 'HIGH' ? 'error' : result.conflict_risk === 'MEDIUM' ? 'warning' : 'success';
      const riskIcon = result.conflict_risk === 'HIGH' ? '🔴' : result.conflict_risk === 'MEDIUM' ? '🟡' : '🟢';

      document.getElementById('check-result').innerHTML = `
        <div class="alert alert-${riskClass}">
          ${riskIcon} <strong>Conflict Risk: ${result.conflict_risk}</strong>
        </div>
        ${result.recommendation ? `<p style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">${result.recommendation}</p>` : ''}
        ${result.similar_trademarks && result.similar_trademarks.length ? `
          <div style="margin-top:10px;">
            <div class="card-title" style="margin-bottom:8px;">Similar Marks Found</div>
            ${result.similar_trademarks.map(t => `
              <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;">
                <strong>${t.trademark_name}</strong> — <span style="color:var(--text-muted);font-size:12px;">${t.owner} / ${t.category}</span>
              </div>`).join('')}
          </div>` : ''}`;
    } catch (err) {
      document.getElementById('check-result').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    } finally {
      btn.disabled = false; btn.innerHTML = 'Run AI Similarity Check';
    }
  }

  document.getElementById('reg-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Registering...';
    try {
      await api.trademarks.create({
        trademark_name: document.getElementById('reg-name').value.trim(),
        owner: document.getElementById('reg-owner').value.trim(),
        category: document.getElementById('reg-category').value,
      });
      toast.success('Trademark registered successfully');
      document.getElementById('reg-form').reset();
      toggleModal('register-modal', false);
      await Promise.all([loadTrademarks(), loadStats()]);
    } catch (err) {
      document.getElementById('reg-msg').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    } finally {
      btn.disabled = false; btn.textContent = 'Register Trademark';
    }
  });

  Promise.all([loadTrademarks(), loadStats()]);
</script>
</body>
</html>
