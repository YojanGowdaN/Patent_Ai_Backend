<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — PatentAI Office System</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon" style="display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;width:48px;height:48px;background:var(--blue-primary);border-radius:10px;margin:0 auto 8px;box-shadow:0 0 20px rgba(30,107,255,0.4);">P</div>
      <h2>PatentAI Office System</h2>
      <p>Federal Intellectual Property Platform</p>
    </div>

    <div id="msg"></div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Panel -->
    <div class="auth-panel active" id="panel-login">
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="login-email" placeholder="officer@patentoffice.gov" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="login-password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="login-btn">Sign In</button>
      </form>
      <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px;">
        Demo: <code style="color:var(--cyan)">examiner@patentai.gov / examiner123</code>
      </p>
    </div>

    <!-- Register Panel -->
    <div class="auth-panel" id="panel-register">
      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Select Your Role</label>
          <div class="role-select">
            <div class="role-option selected" data-role="applicant" onclick="selectRole(this)">
              <span class="role-icon">👤</span>Applicant
            </div>
            <div class="role-option" data-role="examiner" onclick="selectRole(this)">
              <span class="role-icon">🔍</span>Examiner
            </div>
            <div class="role-option" data-role="admin" onclick="selectRole(this)">
              <span class="role-icon">🛡️</span>Admin
            </div>
          </div>
          <input type="hidden" id="reg-role" value="applicant"/>
        </div>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="reg-username" placeholder="Dr. Jane Smith" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="reg-email" placeholder="jane@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="reg-password" placeholder="Create a password" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="reg-btn">Create Account</button>
      </form>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a href="index.html" style="font-size:12px;color:var(--text-muted);">← Back to home</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  // Redirect if already logged in
  auth.requireGuest();

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    document.getElementById('msg').innerHTML = '';
  }

  function selectRole(el) {
    document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('reg-role').value = el.dataset.role;
  }

  function showMsg(text, type = 'error') {
    document.getElementById('msg').innerHTML = `<div class="alert alert-${type}">${text}</div>`;
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
      const user = await api.users.login({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });
      auth.setUser(user);
      window.location.href = user.role === 'applicant' ? 'patents.html' : 'dashboard.html';
    } catch (err) {
      showMsg(err.message || 'Invalid credentials');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  });

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      const user = await api.users.register({
        username: document.getElementById('reg-username').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
        role: document.getElementById('reg-role').value,
      });
      auth.setUser(user);
      window.location.href = user.role === 'applicant' ? 'patents.html' : 'dashboard.html';
    } catch (err) {
      showMsg(err.message || 'Registration failed');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
