<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — PatentAI</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">P</div>
        <div><div class="logo-text">PatentAI</div><div class="logo-sub">Office System</div></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item active" data-href="dashboard.html"><span class="nav-icon">📊</span>Dashboard</div>
      <div class="nav-section-label">Patents</div>
      <div class="nav-item" data-href="patents.html"><span class="nav-icon">📄</span>All Patents</div>
      <div class="nav-item" data-href="submit.html"><span class="nav-icon">➕</span>Submit Patent</div>
      <div class="nav-section-label">Trademarks</div>
      <div class="nav-item" data-href="trademarks.html"><span class="nav-icon">™</span>Trademarks</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" id="logout-btn" title="Click to logout">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="name" id="user-name">Loading...</div>
          <div class="role" id="user-role">—</div>
        </div>
        <span style="margin-left:auto;font-size:12px;color:var(--text-muted);">⏏</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="page-header">
      <h1>Examiner Dashboard</h1>
      <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--cyan);"><span class="ai-pulse"></span>Live Data</span>
      <span class="header-meta" id="last-updated"></span>
    </div>

    <div class="page-body">

      <!-- Stats Grid -->
      <div class="stats-grid" id="stats-grid">
        <div class="loading"><div class="spinner"></div> Loading stats...</div>
      </div>

      <!-- Charts Row -->
      <div class="grid-2" style="margin-bottom:24px;">
        <div class="card">
          <div class="card-header"><span class="card-title">Patents by Domain</span></div>
          <canvas id="domain-chart" height="220"></canvas>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Status Breakdown</span></div>
          <canvas id="status-chart" height="220"></canvas>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Recent Activity</span>
          <button class="btn btn-ghost btn-sm" onclick="loadActivity()">Refresh</button>
        </div>
        <div id="activity-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  if (!auth.requireAuth()) throw new Error('Not authenticated');
  initSidebar();

  const STATUS_COLORS = {
    'Submitted': '#7a8fa8',
    'Under AI Review': '#00d4ff',
    'Formality Check Pending': '#ffb300',
    'Requires Modification': '#ff641e',
    'Examiner Review': '#ce93d8',
    'Approved': '#00e676',
    'Rejected': '#ff3d3d',
  };

  const DOMAIN_COLORS = ['#1e6bff','#00d4ff','#00e676','#ffb300','#ff641e','#ce93d8','#ff3d3d','#3d8bff'];

  async function loadStats() {
    const s = await api.dashboard.stats();
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    const cards = [
      { label: 'Total Patents', value: s.total_patents, sub: `${s.weekly_submissions} this week`, color: '#1e6bff' },
      { label: 'Pending Review', value: s.pending_review, sub: 'Awaiting action', color: '#ffb300' },
      { label: 'AI Reviewed', value: s.ai_reviewed, sub: 'Processed by AI', color: '#00d4ff' },
      { label: 'Duplicate Risk', value: s.duplicate_risk, sub: 'High similarity flagged', color: '#ff641e' },
      { label: 'Approved', value: s.approved, sub: 'Final decisions', color: '#00e676' },
      { label: 'Rejected', value: s.rejected, sub: 'Final decisions', color: '#ff3d3d' },
      { label: 'Today', value: s.today_submissions, sub: 'New submissions', color: '#ce93d8' },
      { label: 'Avg Novelty', value: s.avg_novelty_score != null ? s.avg_novelty_score.toFixed(1) : '—', sub: 'AI score', color: '#3d8bff' },
    ];

    document.getElementById('stats-grid').innerHTML = cards.map(c => `
      <div class="stat-card" style="--accent-color:${c.color}">
        <div class="stat-label">${c.label}</div>
        <div class="stat-value">${c.value}</div>
        <div class="stat-sub">${c.sub}</div>
      </div>
    `).join('');
  }

  function drawBarChart(canvas, labels, values, colors) {
    const ctx = canvas.getContext('2d');
    const W = canvas.offsetWidth; const H = canvas.height = 220;
    canvas.width = W;
    const pad = { top: 16, right: 16, bottom: 48, left: 40 };
    const chartW = W - pad.left - pad.right;
    const chartH = H - pad.top - pad.bottom;
    const max = Math.max(...values, 1);
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0a1628'; ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + (chartH / 4) * i;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + chartW, y); ctx.stroke();
      ctx.fillStyle = '#4a5d73'; ctx.font = '10px Inter'; ctx.textAlign = 'right';
      ctx.fillText(Math.round(max - (max / 4) * i), pad.left - 6, y + 3);
    }

    const barW = Math.min(chartW / labels.length - 8, 50);
    const gap = chartW / labels.length;

    labels.forEach((label, i) => {
      const barH = (values[i] / max) * chartH;
      const x = pad.left + gap * i + (gap - barW) / 2;
      const y = pad.top + chartH - barH;
      const grad = ctx.createLinearGradient(0, y, 0, y + barH);
      grad.addColorStop(0, colors[i % colors.length]);
      grad.addColorStop(1, colors[i % colors.length] + '44');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]) : ctx.rect(x, y, barW, barH);
      ctx.fill();

      // Value on top
      ctx.fillStyle = '#e8edf5'; ctx.font = 'bold 11px Inter'; ctx.textAlign = 'center';
      ctx.fillText(values[i], x + barW / 2, y - 4);

      // Label
      ctx.fillStyle = '#7a8fa8'; ctx.font = '10px Inter';
      const shortLabel = label.length > 10 ? label.slice(0, 10) + '…' : label;
      ctx.save(); ctx.translate(x + barW / 2, pad.top + chartH + 12);
      ctx.rotate(-Math.PI / 5);
      ctx.fillText(shortLabel, 0, 0);
      ctx.restore();
    });
  }

  function drawPieChart(canvas, labels, values, colors) {
    const ctx = canvas.getContext('2d');
    const W = canvas.offsetWidth; const H = 220;
    canvas.width = W; canvas.height = H;
    const cx = W * 0.38, cy = H / 2, r = Math.min(cx, cy) - 16;
    const total = values.reduce((a, b) => a + b, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0a1628'; ctx.fillRect(0, 0, W, H);

    let angle = -Math.PI / 2;
    values.forEach((val, i) => {
      const slice = (val / total) * Math.PI * 2;
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, angle, angle + slice);
      ctx.closePath();
      ctx.fillStyle = colors[i % colors.length];
      ctx.fill();
      ctx.strokeStyle = '#0a1628'; ctx.lineWidth = 2; ctx.stroke();
      angle += slice;
    });

    // Donut hole
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
    ctx.fillStyle = '#0a1628'; ctx.fill();
    ctx.fillStyle = '#e8edf5'; ctx.font = 'bold 18px Inter'; ctx.textAlign = 'center';
    ctx.fillText(total, cx, cy + 3);
    ctx.fillStyle = '#4a5d73'; ctx.font = '10px Inter'; ctx.fillText('Total', cx, cy + 15);

    // Legend
    const lx = W * 0.7, ly = 20;
    labels.forEach((lbl, i) => {
      const y = ly + i * 22;
      ctx.fillStyle = colors[i % colors.length];
      ctx.fillRect(lx, y, 12, 12);
      ctx.fillStyle = '#7a8fa8'; ctx.font = '11px Inter'; ctx.textAlign = 'left';
      ctx.fillText(`${lbl} (${values[i]})`, lx + 18, y + 9);
    });
  }

  async function loadCharts() {
    const [domains, statuses] = await Promise.all([
      api.dashboard.domainBreakdown(),
      api.dashboard.statusBreakdown(),
    ]);

    drawBarChart(
      document.getElementById('domain-chart'),
      domains.map(d => d.domain),
      domains.map(d => d.count),
      DOMAIN_COLORS
    );

    drawPieChart(
      document.getElementById('status-chart'),
      statuses.map(s => s.status),
      statuses.map(s => s.count),
      statuses.map(s => STATUS_COLORS[s.status] || '#1e6bff')
    );
  }

  async function loadActivity() {
    const activities = await api.dashboard.recentActivity();
    const el = document.getElementById('activity-list');
    if (!activities.length) {
      el.innerHTML = '<div class="empty"><div class="empty-text">No activity yet</div></div>';
      return;
    }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Patent ID</th><th>Title</th><th>Action</th><th>Time</th></tr></thead>
      <tbody>${activities.map(a => `
        <tr onclick="window.location='patent-detail.html?id='" style="cursor:pointer;">
          <td><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);">${a.patent_id}</span></td>
          <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.patent_title}</td>
          <td style="color:var(--text-secondary);font-size:12px;">${a.action}</td>
          <td style="color:var(--text-muted);font-size:12px;">${formatDate(a.created_at)}</td>
        </tr>`).join('')}
      </tbody></table></div>`;
  }

  Promise.all([loadStats(), loadCharts(), loadActivity()]);
</script>
</body>
</html>
